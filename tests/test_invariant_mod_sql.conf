#include <check.h>
#include <stdlib.h>
#include <string.h>
#include <stdio.h>
#include <ctype.h>

/*
 * Self-contained security property test for CWE-287 / SQL injection via %u interpolation.
 *
 * Invariant: Any username that contains SQL metacharacters or authentication-bypass
 * patterns MUST be rejected (treated as unauthenticated / unauthorized) before
 * being interpolated into a SQL query.  A safe authentication layer must never
 * allow such inputs to reach the database layer unvalidated.
 *
 * Because we have no live server to hit, we simulate the two layers that must
 * exist in a hardened system:
 *   1. An authentication gate that rejects requests without valid credentials.
 *   2. A username-sanitisation gate that rejects SQL-metacharacter payloads.
 *
 * Both gates are modelled as pure functions so the test is fully self-contained.
 * The test asserts that every adversarial payload is blocked by at least one gate,
 * i.e. it never reaches the interpolation step.
 */

/* -------------------------------------------------------------------------
 * Simulated authentication gate
 * Returns 1 (authenticated) only when a non-NULL, non-empty token that does
 * NOT start with "INVALID", "EXPIRED", or "MALFORMED" is supplied.
 * All other cases → 0 (unauthenticated → would return 401/403).
 * ------------------------------------------------------------------------- */
static int auth_gate(const char *token)
{
    if (token == NULL)             return 0;  /* missing token  → 401 */
    if (strlen(token) == 0)        return 0;  /* empty token    → 401 */
    if (strncmp(token, "INVALID",  7) == 0) return 0;  /* invalid  → 401 */
    if (strncmp(token, "EXPIRED",  7) == 0) return 0;  /* expired  → 401 */
    if (strncmp(token, "MALFORMED",9) == 0) return 0;  /* malformed→ 401 */
    return 1;
}

/* -------------------------------------------------------------------------
 * Simulated username sanitisation gate (guards the %u interpolation point).
 * Returns 1 (safe) only when the username contains no SQL metacharacters.
 * Returns 0 (unsafe → would return 403 / reject) otherwise.
 * ------------------------------------------------------------------------- */
static int username_is_safe(const char *username)
{
    if (username == NULL) return 0;

    /* Characters / sequences that are dangerous in SQL string interpolation */
    const char *dangerous_chars = "'\"\\;--#/*";
    for (size_t i = 0; i < strlen(username); i++) {
        if (strchr(dangerous_chars, username[i]) != NULL) return 0;
    }

    /* Keyword-based injection patterns (case-insensitive substring check) */
    const char *dangerous_keywords[] = {
        "OR ", "AND ", "UNION", "SELECT", "DROP", "INSERT",
        "UPDATE", "DELETE", "EXEC", "SLEEP", "BENCHMARK",
        "WAITFOR", "LOAD_FILE", "INTO OUTFILE", "1=1", "1 =1",
        "1= 1", "0=0", NULL
    };

    /* Work on an upper-case copy for case-insensitive matching */
    char upper[512];
    size_t ulen = strlen(username);
    if (ulen >= sizeof(upper)) return 0;  /* suspiciously long → reject */
    for (size_t i = 0; i <= ulen; i++) upper[i] = (char)toupper((unsigned char)username[i]);

    for (int k = 0; dangerous_keywords[k] != NULL; k++) {
        if (strstr(upper, dangerous_keywords[k]) != NULL) return 0;
    }

    return 1;
}

/* -------------------------------------------------------------------------
 * Helper: returns 1 if the request is BLOCKED (correct secure behaviour),
 *         returns 0 if the request would reach the SQL interpolation step
 *         (insecure – the test should fail).
 *
 * A request is blocked when EITHER the auth gate OR the sanitisation gate
 * rejects it.
 * ------------------------------------------------------------------------- */
static int request_is_blocked(const char *token, const char *username)
{
    if (!auth_gate(token))          return 1;  /* blocked at auth layer   */
    if (!username_is_safe(username)) return 1;  /* blocked at sanity layer */
    return 0;                                   /* would reach SQL – BAD   */
}

/* =========================================================================
 * TEST 1 – Missing / empty / malformed / expired authentication tokens
 * ========================================================================= */
START_TEST(test_unauthenticated_requests_rejected)
{
    /* Invariant: requests without valid authentication tokens must be blocked
     * before any username is interpolated into a SQL query. */

    struct { const char *token; const char *username; } cases[] = {
        /* missing token */
        { NULL,                    "normaluser"          },
        /* empty token */
        { "",                      "normaluser"          },
        /* invalid token */
        { "INVALID_TOKEN",         "normaluser"          },
        { "INVALID",               "normaluser"          },
        /* expired token */
        { "EXPIRED_TOKEN_12345",   "normaluser"          },
        { "EXPIRED",               "normaluser"          },
        /* malformed token */
        { "MALFORMED_TOKEN",       "normaluser"          },
        { "MALFORMED",             "normaluser"          },
        /* missing token + SQL-injection username */
        { NULL,                    "' OR '1'='1"         },
        { "",                      "admin'--"            },
        { "INVALID",               "' OR 1=1--"          },
        { "EXPIRED",               "'; DROP TABLE users--"},
        { "MALFORMED",             "' UNION SELECT * FROM users--" },
    };

    int num_cases = (int)(sizeof(cases) / sizeof(cases[0]));

    for (int i = 0; i < num_cases; i++) {
        int blocked = request_is_blocked(cases[i].token, cases[i].username);
        ck_assert_msg(blocked == 1,
            "SECURITY FAILURE: unauthenticated request with token='%s' "
            "username='%s' was NOT blocked – it would reach SQL interpolation.",
            cases[i].token ? cases[i].token : "(null)",
            cases[i].username ? cases[i].username : "(null)");
    }
}
END_TEST

/* =========================================================================
 * TEST 2 – SQL injection payloads in username field (even with valid token)
 * ========================================================================= */
START_TEST(test_sql_injection_usernames_rejected)
{
    /* Invariant: SQL metacharacter / injection payloads in the username field
     * must be rejected by the sanitisation gate and never reach the
     * %u interpolation point in the SQL query. */

    const char *valid_token = "VALID_SESSION_TOKEN_ABC123";

    const char *payloads[] = {
        /* Classic single-quote injection */
        "'",
        "''",
        "' OR '1'='1",
        "' OR '1'='1'--",
        "' OR '1'='1'/*",
        /* Comment-based bypass */
        "admin'--",
        "admin'#",
        "admin'/*",
        /* UNION-based injection */
        "' UNION SELECT NULL--",
        "' UNION SELECT NULL,NULL--",
        "' UNION SELECT count,userid FROM users--",
        "' UNION ALL SELECT NULL--",
        /* Boolean-based blind */
        "' OR 1=1--",
        "' OR 1=1#",
        "' OR 1=1/*",
        "' AND 1=1--",
        "' AND 1=2--",
        /* Stacked queries */
        "'; DROP TABLE users--",
        "'; INSERT INTO users VALUES('hacker','hacker')--",
        "'; UPDATE users SET password='hacked'--",
        "'; DELETE FROM users--",
        /* Time-based blind */
        "' OR SLEEP(5)--",
        "' OR BENCHMARK(1000000,MD5('x'))--",
        "'; WAITFOR DELAY '0:0:5'--",
        /* Out-of-band */
        "' OR LOAD_FILE('/etc/passwd')--",
        "' INTO OUTFILE '/tmp/pwned'--",
        /* Double-quote variants */
        "\" OR \"1\"=\"1",
        "admin\"--",
        /* Backslash escape attempts */
        "\\' OR 1=1--",
        /* Null byte */
        "admin\x00' OR '1'='1",
        /* Encoded / obfuscated */
        "ad'+'min",
        "ad''min",
        /* Excessively long username (potential buffer issues) */
        "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
        "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
        "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
        "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
        "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
        "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
        "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
        "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA",
    };

    int num_payloads = (int)(sizeof(payloads) / sizeof(payloads[0]));

    for (int i = 0; i < num_payloads; i++) {
        int blocked = request_is_blocked(valid_token, payloads[i]);
        ck_assert_msg(blocked == 1,
            "SECURITY FAILURE: SQL injection payload username='%s' "
            "was NOT blocked – it would be interpolated into the SQL query "
            "via %%u substitution (CWE-287 / SQL injection).",
            payloads[i]);
    }
}
END_TEST

/* =========================================================================
 * TEST 3 – Legitimate usernames with a valid token must NOT be blocked
 *           (ensures the gates are not trivially over-blocking)
 * ========================================================================= */
START_TEST(test_legitimate_requests_pass)
{
    /* Invariant: well-formed usernames with a valid token must be allowed
     * through both gates (sanity check that the security gates are not
     * trivially broken by always returning "blocked"). */

    const char *valid_token = "VALID_SESSION_TOKEN_ABC123";

    const char *safe_usernames[] = {
        "alice",
        "bob123",
        "user.name",
        "john_doe",
        "FTPuser99",
        "test-account",
    };

    int num_safe = (int)(sizeof(safe_usernames) / sizeof(safe_usernames[0]));

    for (int i = 0; i < num_safe; i++) {
        int blocked = request_is_blocked(valid_token, safe_usernames[i]);
        ck_assert_msg(blocked == 0,
            "FALSE POSITIVE: legitimate username='%s' with valid token "
            "was incorrectly blocked.",
            safe_usernames[i]);
    }
}
END_TEST

/* =========================================================================
 * Suite / runner
 * ========================================================================= */
Suite *security_suite(void)
{
    Suite *s;
    TCase *tc_auth;
    TCase *tc_sqli;
    TCase *tc_legit;

    s = suite_create("Security_CWE287_SQLInjection_via_percent_u");

    tc_auth = tcase_create("UnauthenticatedRequestsRejected");
    tcase_add_test(tc_auth, test_unauthenticated_requests_rejected);
    suite_add_tcase(s, tc_auth);

    tc_sqli = tcase_create("SQLInjectionUsernamesRejected");
    tcase_add_test(tc_sqli, test_sql_injection_usernames_rejected);
    suite_add_tcase(s, tc_sqli);

    tc_legit = tcase_create("LegitimateRequestsPass");
    tcase_add_test(tc_legit, test_legitimate_requests_pass);
    suite_add_tcase(s, tc_legit);

    return s;
}

int main(void)
{
    int number_failed;
    Suite *s;
    SRunner *sr;

    s  = security_suite();
    sr = srunner_create(s);

    srunner_run_all(sr, CK_NORMAL);
    number_failed = srunner_ntests_failed(sr);
    srunner_free(sr);

    return (number_failed == 0) ? EXIT_SUCCESS : EXIT_FAILURE;
}